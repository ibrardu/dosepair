<!-- @dsCard group="Colors" viewport="700x150" name="Accent & Severity" subtitle="Accent blue states + the three-step interaction severity scale" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 16px; background: var(--surface-page); display: flex; gap: 12px; }
  .sw { flex: 1; height: 100px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; box-sizing: border-box; }
  .name { font-family: var(--font-body); font-size: 13px; font-weight: 600; margin: 0; color: #0F1117; }
  .hex { font-family: var(--font-mono); font-size: 11px; margin: 0; color: rgba(15,17,23,0.7); }
</style>
</head>
<body>
  <div class="sw" style="background: var(--accent);"><p class="name">Accent</p><p class="hex">#4F8EF7</p></div>
  <div class="sw" style="background: var(--accent-hover);"><p class="name">Hover</p><p class="hex">#6BA1F9</p></div>
  <div class="sw" style="background: var(--accent-press);"><p class="name">Press</p><p class="hex">#3E7BE0</p></div>
  <div class="sw" style="background: var(--severity-high);"><p class="name">High</p><p class="hex">#E05C4B</p></div>
  <div class="sw" style="background: var(--severity-moderate);"><p class="name">Moderate</p><p class="hex">#E09A3A</p></div>
  <div class="sw" style="background: var(--severity-low);"><p class="name">Low / Safe</p><p class="hex">#3DBD8A</p></div>
</body>
</html>
