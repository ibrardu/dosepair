<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid — space-1 through space-8" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-page); display: flex; gap: 20px; align-items: flex-end; height: 110px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 28px; background: var(--tint-blue); border: 1px solid rgba(79,142,247,0.4); border-radius: 3px; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="step"><div class="bar" style="height: 4px"></div><span class="lab">1·4</span></div>
  <div class="step"><div class="bar" style="height: 8px"></div><span class="lab">2·8</span></div>
  <div class="step"><div class="bar" style="height: 12px"></div><span class="lab">3·12</span></div>
  <div class="step"><div class="bar" style="height: 16px"></div><span class="lab">4·16</span></div>
  <div class="step"><div class="bar" style="height: 24px"></div><span class="lab">5·24</span></div>
  <div class="step"><div class="bar" style="height: 32px"></div><span class="lab">6·32</span></div>
  <div class="step"><div class="bar" style="height: 48px"></div><span class="lab">7·48</span></div>
  <div class="step"><div class="bar" style="height: 64px"></div><span class="lab">8·64</span></div>
</body>
</html>
