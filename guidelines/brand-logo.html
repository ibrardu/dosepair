<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); display: flex; align-items: center; gap: 40px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/logo.svg" alt="DosePair mark" width="56" height="56">
    <div>
      <div style="font-family: var(--font-display); font-weight: 700; font-size: 32px; letter-spacing: -0.02em; color: var(--text-body);">DosePair</div>
      <div style="font-family: var(--font-body); font-size: 13px; color: var(--text-secondary);">See how your medications interact — before they do.</div>
    </div>
  </div>
  <div class="lockup" style="margin-left: auto; flex-direction: column; gap: 8px; align-items: center;">
    <img src="../assets/logo.svg" alt="" width="32" height="32">
    <span class="meta">Mark only · 24px in nav</span>
  </div>
</body>
</html>
