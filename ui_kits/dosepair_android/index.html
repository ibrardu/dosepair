<!-- ═══ BLOCK 1: Icons · data · buildResult ═══ -->
<script type="text/babel">
const RB="Roboto,'IBM Plex Sans',system-ui,sans-serif";
const IP3={
  search:[["circle",{cx:11,cy:11,r:8}],["path",{d:"m21 21-4.3-4.3"}]],
  pill:[["path",{d:"m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"}],["path",{d:"m8.5 8.5 7 7"}]],
  flask:[["path",{d:"M14 2v6l3 5.5c1.25 2.13.27 4.81-2.22 5.5a5 5 0 0 1-5.56-1.87C7.7 15.1 8 12.73 9.33 11.2L12 8V2"}],["path",{d:"M8.5 2h7"}],["path",{d:"M7 16h10"}]],
  history:[["path",{d:"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"}],["path",{d:"M3 3v5h5"}],["path",{d:"M12 7v5l4 2"}]],
  settings:[["path",{d:"M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"}],["circle",{cx:12,cy:12,r:3}]],
  plus:[["path",{d:"M5 12h14"}],["path",{d:"M12 5v14"}]],
  warn:[["path",{d:"m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"}],["path",{d:"M12 9v4"}],["path",{d:"M12 17h.01"}]],
  check:[["circle",{cx:12,cy:12,r:10}],["path",{d:"m9 12 2 2 4-4"}]],
  bulb:[["path",{d:"M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"}],["path",{d:"M9 18h6"}],["path",{d:"M10 22h4"}]],
  chevdown:[["path",{d:"m6 9 6 6 6-6"}]],
  utensil:[["path",{d:"M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"}],["path",{d:"M7 2v20"}],["path",{d:"M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"}]],
  flash:[["path",{d:"M13 2 3 14h9l-1 8 10-12h-9l1-8z"}]],
};
function AIcon({name,size=24,color="currentColor",sw=2}){
  const p=IP3[name];if(!p)return null;
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}>
    {p.map(([t,a],i)=>t==="circle"?<circle key={i} {...a}/>:<path key={i} {...a}/>)}
  </svg>;
}

function MCard({children,pad=14,style={}}){
  return <div style={{background:"var(--surface-card)",borderRadius:12,padding:pad,border:"1px solid var(--border-default)",...style}}>{children}</div>;
}
function MBtn({children,onClick,disabled,secondary,small,style={}}){
  const bg=disabled?"var(--border-default)":secondary?"var(--surface-raised)":"var(--accent)";
  const col=disabled?"var(--text-muted)":secondary?"var(--text-body)":"#fff";
  return <button onClick={onClick} disabled={disabled} style={{height:small?36:48,padding:small?"0 14px":"0 24px",borderRadius:small?10:24,border:"none",cursor:disabled?"default":"pointer",background:bg,color:col,fontFamily:RB,fontWeight:500,fontSize:small?13:15,transition:"background .15s",...style}}>{children}</button>;
}
function MBadge({tone="neutral",children}){
  const map={high:["var(--tint-red)","var(--severity-high)"],moderate:["var(--tint-amber)","var(--severity-moderate)"],low:["var(--tint-green)","var(--severity-low)"],info:["var(--tint-blue)","var(--accent)"],teal:["var(--tint-teal)","var(--research)"],neutral:["var(--surface-raised)","var(--text-secondary)"]};
  const [bg,fg]=map[tone]||map.neutral;
  return <span style={{background:bg,color:fg,borderRadius:6,padding:"3px 8px",fontSize:11,fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"0.07em",display:"inline-flex",alignItems:"center"}}>{children}</span>;
}

const PLOTS3=["#4F8EF7","#C084FC","#2DD4BF","#F472B6","#E09A3A"];
const PKD3={
  Warfarin:{hl:40,pk:4,meta:"CYP2C9",hit:true,src:"dailymed"},
  Aspirin:{hl:6,pk:1,meta:"Hepatic esterases",hit:true,src:"dailymed"},
  Dovato:{hl:14,pk:1.5,meta:"UGT1A1 85%, CYP3A4 12%",hit:true,src:"dailymed"},
  Tadalafil:{hl:17.5,pk:2,meta:"CYP3A4 primary",hit:true,src:"dailymed"},
  Luteolin:{hl:5,pk:1,meta:"CYP3A4 inhibitor",hit:false,src:"llm"},
  Metformin:{hl:6.2,pk:2.5,meta:"Renal, unchanged",hit:true,src:"dailymed"},
  Lisinopril:{hl:12,pk:6,meta:"Renal, unchanged",hit:true,src:"dailymed"},
  Sertraline:{hl:26,pk:5,meta:"CYP2D6, CYP2C19",hit:true,src:"dailymed"},
  Tramadol:{hl:6.3,pk:2,meta:"CYP2D6, CYP3A4",hit:true,src:"dailymed"},
  Atorvastatin:{hl:14,pk:1.5,meta:"CYP3A4",hit:true,src:"dailymed"},
  Amlodipine:{hl:40,pk:7,meta:"CYP3A4",hit:true,src:"dailymed"},
  Omeprazole:{hl:1,pk:1,meta:"CYP2C19",hit:true,src:"dailymed"},
  Clopidogrel:{hl:6,pk:1,meta:"CYP2C19 (prodrug)",hit:true,src:"dailymed"},
  Levothyroxine:{hl:168,pk:2,meta:"Deiodination",hit:true,src:"dailymed"},
  Calcium:{hl:4,pk:2,meta:"None (mineral)",hit:true,src:"openfda"},
};
const IXD3=[
  {pair:["Warfarin","Aspirin"],sev:"high",hit:true,effect:"Significantly increased bleeding risk.",mech:"Aspirin inhibits platelet aggregation; warfarin blocks vitamin-K clotting factors."},
  {pair:["Sertraline","Tramadol"],sev:"high",hit:true,effect:"Risk of serotonin syndrome.",mech:"Both raise synaptic serotonin; tramadol adds SNRI activity via CYP2D6 competition."},
  {pair:["Omeprazole","Clopidogrel"],sev:"moderate",hit:true,effect:"Reduced clopidogrel antiplatelet efficacy.",mech:"Omeprazole inhibits CYP2C19, which activates the clopidogrel prodrug."},
  {pair:["Levothyroxine","Calcium"],sev:"moderate",hit:true,effect:"Reduced levothyroxine absorption.",mech:"Calcium chelates levothyroxine in the GI tract. Separate by ≥4h."},
  {pair:["Tadalafil","Luteolin"],sev:"moderate",hit:false,effect:"Possible increased tadalafil exposure.",mech:"Luteolin moderately inhibits CYP3A4, tadalafil's primary clearance pathway."},
  {pair:["Atorvastatin","Amlodipine"],sev:"moderate",hit:true,effect:"Modestly increased statin exposure.",mech:"Amlodipine weakly inhibits CYP3A4 atorvastatin clearance."},
  {pair:["Metformin","Lisinopril"],sev:"low",hit:true,effect:"Generally safe; minor additive glucose lowering.",mech:"ACE inhibitors mildly enhance insulin sensitivity."},
];
const FOOD3={
  Warfarin:{note:"Avoid sudden changes in vitamin K intake (leafy greens) — alters INR.",score:6},
  Atorvastatin:{note:"Grapefruit juice significantly increases atorvastatin exposure. Avoid.",score:7},
  Tadalafil:{note:"Grapefruit juice inhibits CYP3A4 — may increase tadalafil levels.",score:5},
  Levothyroxine:{note:"Take 30–60 min before food. Dairy and calcium reduce absorption.",score:5},
  Metformin:{note:"Take with meals to reduce GI upset (nausea, diarrhoea).",score:3},
  Sertraline:{note:"Avoid alcohol — additive CNS depression and worsened mood.",score:4},
};
const SE3=[
  {note:"Monitor for serotonin syndrome: agitation, rapid pulse, high temperature, muscle twitching.",score:9,drugs:["Sertraline","Tramadol"]},
  {note:"Myopathy risk (muscle pain/weakness) modestly elevated.",score:5,drugs:["Atorvastatin","Amlodipine"]},
  {note:"Reduced platelet inhibition — consider alternative PPI if high cardiac risk.",score:6,drugs:["Omeprazole","Clopidogrel"]},
  {note:"Monitor for GI bleeding: black or tarry stools, abdominal pain.",score:8,drugs:["Warfarin","Aspirin"]},
];
function buildResult3(meds){
  const hs=[8,10,13,16,19];
  const drugs=meds.map((m,i)=>{const pk=PKD3[m.name]||{hl:8,pk:2,meta:"Unknown",hit:false,src:"llm"};const h=m.hour||hs[i%hs.length];return{...pk,name:m.name,doseH:h,color:PLOTS3[i%PLOTS3.length],time:m.time||(h<=12?h+"am":(h-12)+"pm"),dose:m.dose||""};});
  const names=drugs.map(d=>d.name);
  const ord={high:0,moderate:1,low:2};
  const ixs=IXD3.filter(x=>x.pair.every(p=>names.includes(p))).sort((a,b)=>ord[a.sev]-ord[b.sev]);
  const insights=[];
  ixs.forEach(x=>{if(x.sev==="high") insights.push({type:"warning",score:8,text:`Avoid combining ${x.pair[0]} and ${x.pair[1]} without clinical guidance.`,why:x.mech,drugs:x.pair});else if(x.sev==="moderate") insights.push({type:"tip",score:5,text:`Separate ${x.pair[0]} and ${x.pair[1]} doses to reduce peak overlap.`,why:x.mech,drugs:x.pair});});
  SE3.forEach(se=>{if(se.drugs.every(d=>names.includes(d))) insights.push({type:"side_effect",score:se.score,text:se.note,why:"Pharmacodynamic interaction — both agents contribute to the same adverse pathway.",drugs:se.drugs});});
  const seenF=new Set();
  drugs.forEach(d=>{const f=FOOD3[d.name];if(f&&!seenF.has(d.name)){seenF.add(d.name);insights.push({type:"food",score:f.score,text:f.note,why:"Food-drug interaction via absorption, CYP3A4 metabolism, or pharmacodynamic overlap.",drugs:[d.name]});}});
  // cache info removed
  return{drugs,ixs,insights,llm:drugs.every(d=>d.src!=="llm")?"groq":"claude haiku",hits:`${drugs.filter(d=>d.hit).length}/${drugs.length}`,worst:ixs[0]?.sev||null};
}
function PlasmaChart3({drugs}){
  const ref = React.useRef(null);
  const wrapRef = React.useRef(null);
  const [hover, setHover] = React.useState(null);
  const H = 170;
  React.useEffect(()=>{
    if (!ref.current) return;
    window.DosePairChart.drawChart(ref.current, drugs, {hoverT: hover?hover.t:null, compact: true, height: H});
  },[drugs, hover]);
  const onMove = e => {
    const r = ref.current.getBoundingClientRect();
    const x = e.clientX - r.left;
    const t = window.DosePairChart.xToTime(ref.current, x, {compact: true});
    const data = window.DosePairChart.getHoverData(drugs, t);
    setHover({t, x: e.clientX - r.left, data});
  };
  return <div ref={wrapRef} style={{position:"relative"}}>
    <canvas
      ref={ref}
      style={{width:"100%",height:H,display:"block",cursor:"crosshair",touchAction:"none"}}
      onMouseMove={onMove}
      onMouseLeave={()=>setHover(null)}
      onTouchStart={e=>{e.preventDefault();const t=e.touches[0];const r=ref.current.getBoundingClientRect();const x=t.clientX-r.left;const time=window.DosePairChart.xToTime(ref.current,x,{compact:true});setHover({t:time,x,data:window.DosePairChart.getHoverData(drugs,time)});}}
      onTouchMove={e=>{e.preventDefault();const t=e.touches[0];const r=ref.current.getBoundingClientRect();const x=t.clientX-r.left;const time=window.DosePairChart.xToTime(ref.current,x,{compact:true});setHover({t:time,x,data:window.DosePairChart.getHoverData(drugs,time)});}}
      onTouchEnd={()=>setHover(null)}
    />
    {hover && <div style={{
      position:"absolute",
      left: Math.min(hover.x + 10, (wrapRef.current?.clientWidth || 9999) - 150),
      top: 8,
      background:"var(--surface-card)",
      border:"1px solid var(--border-default)",
      borderRadius: 10,
      padding:"7px 9px",
      boxShadow: "var(--shadow-lift)",
      fontFamily:"var(--font-mono)",
      fontSize: 10,
      color:"var(--text-body)",
      pointerEvents:"none",
      minWidth: 130,
      zIndex: 5,
    }}>
      <div style={{color:"var(--text-muted)",marginBottom:4,fontSize:10}}>{window.DosePairChart.formatTime(hover.t)}</div>
      {hover.data.map(d=>(
        <div key={d.name} style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:d.color,display:"inline-block"}}/>
          <span style={{flex:1,fontFamily:"var(--font-body)",fontSize:11}}>{d.name}</span>
          <span style={{color:"var(--text-secondary)"}}>{d.value.toFixed(0)}%</span>
        </div>
      ))}
    </div>}
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:6,fontFamily:"var(--font-mono)",fontSize:10,color:"var(--text-muted)"}}>
      {drugs.map(d=>(
        <span key={d.name} style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:12,height:2,background:d.color,display:"inline-block",borderRadius:1}}/>{d.name}
        </span>
      ))}
    </div>
  </div>;
}


window.MSAndroid3={AIcon,MCard,MBtn,MBadge,buildResult3,PlasmaChart3,RB};
</script>

<!-- ═══ BLOCK 2: Home Screen ═══ -->
<script type="text/babel">
const COMBOS3=[["Warfarin","Aspirin"],["Metformin","Lisinopril"],["Atorvastatin","Amlodipine"],["Sertraline","Tramadol"],["Omeprazole","Clopidogrel"],["Levothyroxine","Calcium"]];
const SUGG3=["Aspirin","Atorvastatin","Amlodipine","Calcium","Clopidogrel","Dovato","Ibuprofen","Levothyroxine","Lisinopril","Luteolin","Metformin","Omeprazole","Sertraline","Sildenafil","Tadalafil","Tramadol","Warfarin"];

function AndroidHome({onAnalyze}){
  const {AIcon,RB}=window.MSAndroid3;
  const [query,setQuery]=React.useState("");
  const [chips,setChips]=React.useState([]);
  const [open,setOpen]=React.useState(false);
  const matched=query.trim()?SUGG3.filter(s=>s.toLowerCase().startsWith(query.toLowerCase())&&!chips.includes(s)).slice(0,5):[];
  const add=n=>{if(chips.length>=5)return;const t=n.trim();if(!t||chips.includes(t))return;setChips([...chips,t]);setQuery("");};
  const onKey=e=>{if(e.key==="+"||e.key===","){e.preventDefault();add(query);}else if(e.key==="Enter"){e.preventDefault();if(query.trim())add(query);else if(chips.length)onAnalyze(chips);}else if(e.key==="Backspace"&&!query&&chips.length)setChips(chips.slice(0,-1));};
  return <div style={{fontFamily:RB,color:"var(--text-body)",paddingBottom:8}}>
    <div style={{padding:"16px 16px 8px",display:"flex",alignItems:"center",gap:12}}>
      <img src="../../assets/logo.svg" alt="" width="28" height="28"/>
      <span style={{fontSize:22,fontWeight:500,letterSpacing:"-0.01em",flex:1}}>DosePair</span>
    </div>
    <div style={{padding:"8px 16px 20px"}}>
      <p style={{margin:0,fontSize:28,fontWeight:400,lineHeight:1.25,color:"var(--text-body)"}}>See how your medications interact</p>
      <p style={{margin:"6px 0 0",fontSize:14,color:"var(--text-secondary)"}}>Enter up to 5 drugs and get interaction analysis.</p>
    </div>
    <div style={{margin:"0 16px 12px",position:"relative"}}>
      <div style={{background:"var(--surface-raised)",borderRadius:12,border:`1px solid ${open?"var(--accent)":"var(--border-default)"}`,boxShadow:open?"0 0 0 2px rgba(79,142,247,.18)":undefined,transition:"all .15s"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px"}}>
          <AIcon name="search" size={18} color="var(--text-muted)"/>
          <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={onKey} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),130)} placeholder={chips.length?"Add another drug…":"Search drugs… e.g. Warfarin"} style={{flex:1,background:"none",border:"none",outline:"none",color:"var(--text-body)",fontSize:16,fontFamily:RB}}/>
        </div>
        {chips.length>0&&<div style={{padding:"0 14px 12px",display:"flex",flexWrap:"wrap",gap:6}}>
          {chips.map(c=><span key={c} style={{display:"inline-flex",alignItems:"center",gap:4,background:"var(--tint-blue)",color:"var(--accent)",border:"1px solid rgba(79,142,247,.35)",borderRadius:20,padding:"4px 8px 4px 12px",fontSize:13,fontWeight:500}}>
            {c}<span onClick={()=>setChips(chips.filter(x=>x!==c))} style={{cursor:"pointer",fontSize:16,opacity:.7,lineHeight:1}}>×</span>
          </span>)}
          {chips.length>0&&<span style={{fontSize:11,color:chips.length>=5?"var(--severity-moderate)":"var(--text-muted)",fontFamily:"var(--font-mono)",alignSelf:"center"}}>{chips.length}/5</span>}
        </div>}
      </div>
      {open&&matched.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:20,background:"var(--surface-raised)",borderRadius:12,border:"1px solid var(--border-default)",marginTop:4,overflow:"hidden",boxShadow:"0 4px 16px rgba(0,0,0,.25)"}}>
        {matched.map(s=><div key={s} onMouseDown={e=>{e.preventDefault();add(s);}} style={{padding:"13px 16px",fontSize:15,color:"var(--text-body)",cursor:"pointer",borderBottom:"0.5px solid var(--border-default)"}}>{s}</div>)}
      </div>}
    </div>
    <div style={{padding:"0 16px 20px"}}>
      <button onClick={()=>onAnalyze(chips)} disabled={chips.length===0} style={{width:"100%",height:52,borderRadius:12,border:"none",cursor:chips.length?"pointer":"default",background:chips.length?"var(--accent)":"var(--border-default)",color:chips.length?"#fff":"var(--text-muted)",fontFamily:RB,fontWeight:500,fontSize:16,transition:"background .15s"}}>
        Analyze Interactions
      </button>
    </div>
    <div style={{padding:"0 16px 16px"}}>
      <div style={{fontSize:11,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontFamily:"var(--font-mono)"}}>Quick combos</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {COMBOS3.map(c=><button key={c.join("+")} onClick={()=>onAnalyze(c)} style={{background:"var(--surface-raised)",border:"1px solid var(--border-default)",borderRadius:20,padding:"7px 14px",fontSize:13,color:"var(--text-body)",cursor:"pointer",fontFamily:RB,whiteSpace:"nowrap"}}>{c.join(" + ")}</button>)}
      </div>
    </div>
    <div style={{margin:"0 16px",background:"var(--surface-raised)",borderRadius:12,padding:"14px 16px",display:"flex",justifyContent:"space-around",border:"1px solid var(--border-default)"}}>
      {[["12,400+","drugs indexed"],["850K+","interactions"],["Free","no account"]].map(([v,l])=><div key={l} style={{textAlign:"center"}}>
        <div style={{fontSize:16,fontWeight:700,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>{v}</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{l}</div>
      </div>)}
    </div>
  </div>;
}
window.MSAndroid3={...window.MSAndroid3,AndroidHome};
</script>

<!-- ═══ BLOCK 3: Analyzer + Results ═══ -->
<script type="text/babel">
function AndroidInsightCard({ins}){
  const {AIcon}=window.MSAndroid3;
  const [open,setOpen]=React.useState(false);
  const typeMap={
    warning:    {lab:"Warning",     col:"var(--severity-moderate)", bg:"var(--tint-amber)",  icon:"warn"},
    tip:        {lab:"Timing tip",  col:"var(--accent)",            bg:"var(--tint-blue)",   icon:"bulb"},
    info:       {lab:"Info",        col:"var(--severity-low)",      bg:"var(--tint-green)",  icon:"check"},
    food:       {lab:"Food note",   col:"var(--research)",          bg:"var(--tint-teal)",   icon:"utensil"},
    side_effect:{lab:"Side effect", col:"#C084FC",                  bg:"rgba(192,132,252,.12)",icon:"flash"},
  };
  const meta=typeMap[ins.type]||typeMap.info;
  return (
    <div style={{background:"var(--surface-card)",borderRadius:12,border:"1px solid var(--border-default)",overflow:"hidden"}}>
      <button type="button" onClick={()=>setOpen(o=>!o)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:12,display:"flex",gap:10,alignItems:"flex-start",textAlign:"left"}}>
        <div style={{width:30,height:30,borderRadius:8,background:meta.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
          <AIcon name={meta.icon} size={15} color={meta.col}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:meta.col,fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600}}>{meta.lab}</span>
            {ins.score&&<span style={{background:ins.score>=7?"var(--tint-red)":ins.score>=4?"var(--tint-amber)":"var(--tint-green)",color:ins.score>=7?"var(--severity-high)":ins.score>=4?"var(--severity-moderate)":"var(--severity-low)",borderRadius:999,padding:"2px 7px",fontSize:10,fontFamily:"var(--font-mono)",fontWeight:700,flexShrink:0}}>{ins.score}<span style={{opacity:.6}}>/10</span></span>}
            {ins.drugs&&ins.drugs.map(d=><span key={d} style={{background:"var(--surface-raised)",color:"var(--text-secondary)",borderRadius:999,padding:"2px 7px",fontSize:10}}>{d}</span>)}
            <span style={{marginLeft:"auto",flexShrink:0}}><AIcon name="chevdown" size={14} color="var(--text-muted)"/></span>
          </div>
          <p style={{margin:0,fontSize:13,fontWeight:500,color:"var(--text-body)",lineHeight:1.4}}>{ins.text}</p>
        </div>
      </button>
      {open&&<div style={{borderTop:"1px solid var(--border-default)",padding:"10px 12px 12px 52px",background:"var(--surface-raised)"}}>
        <span style={{fontSize:10,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.07em",fontFamily:"var(--font-mono)",display:"block",marginBottom:4}}>Why</span>
        <p style={{margin:0,fontSize:12,color:"var(--text-secondary)",lineHeight:1.5}}>{ins.why}</p>
      </div>}
    </div>
  );
}

function AndroidAnalyzer({initialDrugs=[]}){
  const {AIcon,MCard,MBtn,MBadge,buildResult3,PlasmaChart3,RB}=window.MSAndroid3;
  const mField={background:"var(--surface-raised)",border:"1px solid var(--border-default)",borderRadius:10,padding:"10px 12px",color:"var(--text-body)",fontSize:14,outline:"none",fontFamily:RB,width:"100%"};
  const mk=(n="",i=0)=>({name:n,dose:"",time:"",key:`${n}-${i}-${Math.random().toString(36).slice(2,6)}`});
  const [rows,setRows]=React.useState(()=>initialDrugs.length?initialDrugs.map(mk):[mk("Dovato",0),mk("Tadalafil",1)]);
  const [result,setResult]=React.useState(null);
  const [loading,setLoading]=React.useState(false);
  const set=(i,p)=>setRows(rows.map((r,j)=>j===i?{...r,...p}:r));
  const run=()=>{const m=rows.filter(r=>r.name.trim());if(!m.length)return;setLoading(true);setResult(null);setTimeout(()=>{setResult(buildResult3(m));setLoading(false);},700);};
  React.useEffect(()=>{if(initialDrugs.length)run();},[]);
  return <div style={{fontFamily:RB,color:"var(--text-body)"}}>
    <div style={{padding:"16px 16px 12px"}}>
      <div style={{fontSize:28,fontWeight:400,letterSpacing:"-0.01em"}}>Analyzer</div>
      <div style={{fontSize:13,color:"var(--text-secondary)",marginTop:3}}>Enter up to 5 medications.</div>
    </div>
    <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:8}}>
      {rows.map((row,i)=><div key={row.key} style={{background:"var(--surface-card)",borderRadius:12,padding:12,border:"1px solid var(--border-default)"}}>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input value={row.name} onChange={e=>set(i,{name:e.target.value})} placeholder="Drug name" style={{...mField,flex:1}}/>
          <button onClick={()=>setRows(rows.filter((_,j)=>j!==i))} style={{width:36,height:42,background:"var(--tint-red)",border:"1px solid rgba(224,92,75,.3)",borderRadius:10,cursor:"pointer",color:"var(--severity-high)",fontSize:18,flexShrink:0}}>×</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <input value={row.dose} onChange={e=>set(i,{dose:e.target.value})} placeholder="Dose (5mg)" style={mField}/>
          <input value={row.time} onChange={e=>set(i,{time:e.target.value})} placeholder="Time (8am)" style={mField}/>
        </div>
      </div>)}
    </div>
    <div style={{padding:"12px 16px",display:"grid",gridTemplateColumns:"auto 1fr",gap:10}}>
      <MBtn secondary onClick={()=>setRows([...rows,mk("",rows.length)])} disabled={rows.length>=5} style={{borderRadius:10,height:44,fontSize:14}}>
        {rows.length>=5?<span style={{color:"var(--severity-moderate)",fontSize:12}}>max 5</span>:<><AIcon name="plus" size={16} color="var(--text-body)"/>&nbsp;Add</>}
      </MBtn>
      <MBtn onClick={run} disabled={loading} style={{borderRadius:10,height:44}}>{loading?"Analyzing…":"Analyze"}</MBtn>
    </div>
    {result&&!loading&&<div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
      <MCard>
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {result.worst&&<MBadge tone={result.worst}>{result.worst}</MBadge>}
        </div>
        <p style={{margin:0,fontSize:14,color:"var(--text-body)",lineHeight:1.5}}>
          {result.ixs.length?`Found ${result.ixs.length} interaction${result.ixs.length>1?"s":""} across ${result.drugs.length} medications.`:`No known interactions across ${result.drugs.length} medication${result.drugs.length>1?"s":""}.`}
        </p>
      </MCard>
      <MCard>
        <div style={{fontSize:14,fontWeight:500,marginBottom:10}}>24-hour plasma levels</div>
        <PlasmaChart3 drugs={result.drugs}/>
      </MCard>
      {result.ixs.length>0&&<>
        <div style={{fontSize:11,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"var(--font-mono)",paddingLeft:2}}>Interactions · {result.ixs.length}</div>
        {result.ixs.map((ix,i)=><MCard key={i}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontWeight:500,fontSize:14,flex:1}}>{ix.pair[0]} × {ix.pair[1]}</span>
            <MBadge tone={ix.sev}>{ix.sev}</MBadge>
          </div>
          <p style={{margin:"0 0 4px",fontSize:13,color:"var(--text-body)"}}>{ix.effect}</p>
          <p style={{margin:0,fontSize:12,color:"var(--text-secondary)"}}>{ix.mech}</p>
        </MCard>)}
      </>}
      <div style={{fontSize:11,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:"var(--font-mono)",paddingLeft:2}}>Insights · {result.insights.length}</div>
      {result.insights.map((ins,i)=><AndroidInsightCard key={i} ins={ins}/>)}
      <div style={{background:"var(--tint-amber)",border:"1px solid rgba(224,154,58,.35)",borderRadius:12,padding:12,display:"flex",gap:10,alignItems:"flex-start"}}>
        <AIcon name="warn" size={16} color="var(--severity-moderate)"/>
        <p style={{margin:0,fontSize:12,color:"var(--text-secondary)",lineHeight:1.5}}><strong style={{color:"var(--severity-moderate)"}}>Not medical advice.</strong> Confirm all changes with your doctor or pharmacist.</p>
      </div>
    </div>}
  </div>;
}
window.MSAndroid3={...window.MSAndroid3,AndroidAnalyzer};
</script>

<!-- ═══ BLOCK 4: Research · History · Settings ═══ -->
<script type="text/babel">
const TRIALS3=[
  {id:"NCT05451234",title:"Long-acting injectable dolutegravir in virally suppressed adults",phase:"Phase 3",status:"Recruiting"},
  {id:"NCT05512879",title:"Doravirine / islatravir switch vs. continued ART",phase:"Phase 3",status:"Active"},

];
const PAPERS3=[

function AndroidResearch(){

      <div style={{fontSize:28,fontWeight:400,marginBottom:14}}>Research</div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{flex:1,background:"var(--surface-raised)",borderRadius:12,border:"1px solid var(--border-default)",display:"flex",alignItems:"center",gap:10,padding:"10px 14px"}}>

        </div>
        <button onClick={()=>setSearched(q)} style={{height:44,padding:"0 18px",borderRadius:12,border:"none",cursor:"pointer",background:"var(--accent)",color:"#fff",fontFamily:RB,fontWeight:500,fontSize:14}}>Search</button>
      </div>
    </div>
    {searched&&<>
      <div style={{display:"flex",gap:8,padding:"0 16px 12px",alignItems:"center",flexWrap:"wrap"}}>

        <span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"var(--text-muted)"}}><span style={{width:6,height:6,borderRadius:"50%",background:"var(--severity-low)",display:"inline-block"}}/>cache hit</span>
      </div>
      <div style={{display:"flex",borderBottom:"1px solid var(--border-default)",margin:"0 16px 14px",gap:4}}>
        {tabs.map(t=>{const on=t.id===tab;return <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,height:44,background:"none",border:"none",cursor:"pointer",color:on?"var(--accent)":"var(--text-muted)",fontFamily:RB,fontWeight:on?500:400,fontSize:13,borderBottom:`2px solid ${on?"var(--accent)":"transparent"}`,marginBottom:-1,transition:"all .15s"}}>{t.label}</button>;})}
      </div>
      <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:8}}>
        {tab==="trials"&&TRIALS3.map(t=><MCard key={t.id}>
          <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}><MBadge tone="teal">{t.phase}</MBadge><span style={{background:"var(--surface-raised)",color:"var(--text-secondary)",borderRadius:6,padding:"3px 8px",fontSize:11,fontFamily:"var(--font-mono)"}}>{t.status}</span></div>
          <p style={{margin:"0 0 4px",fontSize:13,fontWeight:500,color:"var(--text-body)"}}>{t.title}</p>
          <span style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{t.id}</span>
        </MCard>)}
        {tab==="pubmed"&&PAPERS3.map(p=><MCard key={p.pmid}>
          <p style={{margin:"0 0 6px",fontSize:13,fontWeight:500,color:"var(--text-body)"}}>{p.title}</p>
          <span style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{p.journal} · {p.year}</span>
        </MCard>)}
        {tab==="fda"&&FDA3.map(f=><MCard key={f.name}>
          <p style={{margin:"0 0 4px",fontSize:13,fontWeight:500,color:"var(--text-body)"}}>{f.name}</p>
          <p style={{margin:"0 0 6px",fontSize:12,color:"var(--text-secondary)"}}>{f.note}</p>
          <span style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>Approved {f.date}</span>
        </MCard>)}
      </div>
    </>}

}

function AndroidHistory({onReanalyze}){
  const {MCard,MBadge,MBtn,RB}=window.MSAndroid3;
  const [items,setItems]=React.useState([
    {ts:"Today, 9:42am",drugs:["Dovato","Tadalafil","Luteolin"],worst:"moderate",llm:"claude haiku"},
    {ts:"Today, 8:15am",drugs:["Warfarin","Aspirin"],worst:"high",llm:"groq"},
    {ts:"Yesterday",drugs:["Sertraline","Tramadol"],worst:"high",llm:"groq"},
    {ts:"Yesterday",drugs:["Metformin","Lisinopril"],worst:"low",llm:"groq"},
    {ts:"Jun 7",drugs:["Levothyroxine","Calcium"],worst:"moderate",llm:"groq"},
  ]);
  return <div style={{fontFamily:RB,color:"var(--text-body)",paddingBottom:8}}>
    <div style={{padding:"16px 16px 12px",display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
      <div>
        <div style={{fontSize:28,fontWeight:400}}>History</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2,fontFamily:"var(--font-mono)"}}>session b4f2…91ce</div>
      </div>
      {items.length>0&&<button onClick={()=>setItems([])} style={{background:"var(--tint-red)",border:"1px solid rgba(224,92,75,.3)",borderRadius:10,padding:"6px 14px",color:"var(--severity-high)",fontSize:13,cursor:"pointer",fontFamily:RB}}>Clear</button>}
    </div>
    {items.length===0?<div style={{margin:"40px 16px",textAlign:"center",color:"var(--text-secondary)",fontSize:14}}>No analyses yet.</div>:
    <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:8}}>

          <div style={{display:"flex",gap:5}}><MBadge tone={h.worst}>{h.worst}</MBadge></div>

        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
          {h.drugs.map(d=><span key={d} style={{background:"var(--surface-raised)",color:"var(--text-secondary)",borderRadius:20,padding:"3px 10px",fontSize:12}}>{d}</span>)}
        </div>
        <MBtn secondary onClick={()=>onReanalyze(h.drugs)} style={{width:"100%",borderRadius:10,height:36,fontSize:13}}>Re-analyze</MBtn>

}

function AndroidSettings(){
  const {AIcon,MCard,RB}=window.MSAndroid3;
  const Row=({label,detail,tog,togOn,onTog,isLast})=><div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderBottom:isLast?"none":"1px solid var(--border-default)"}}>

      <div style={{background:"var(--tint-amber)",border:"1px solid rgba(224,154,58,.35)",borderRadius:12,padding:12,display:"flex",gap:10}}>

}
window.MSAndroid3={...window.MSAndroid3,AndroidResearch,AndroidHistory,AndroidSettings};
</script>

<!-- ═══ BLOCK 5: App Shell ═══ -->
<script type="text/babel">
const ATABS3=[
  {id:"home",label:"Home",icon:"search"},
  {id:"analyze",label:"Analyze",icon:"pill"},
  {id:"research",label:"Research",icon:"flask"},
  {id:"history",label:"History",icon:"history"},
  {id:"settings",label:"Settings",icon:"settings"},
];

function AndroidBottomNav({active,onChange}){
  const {AIcon}=window.MSAndroid3;
  return <div style={{display:"flex",background:"var(--surface-card)",borderTop:"1px solid var(--border-default)",paddingBottom:4}}>
    {ATABS3.map(t=>{const on=t.id===active;return <button key={t.id} onClick={()=>onChange(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 0 6px",color:on?"var(--accent)":"var(--text-muted)",transition:"color .12s",position:"relative"}}>
      {on&&<span style={{position:"absolute",top:6,width:56,height:30,borderRadius:999,background:"var(--tint-blue)"}}/>}
      <AIcon name={t.icon} size={22} color={on?"var(--accent)":"var(--text-muted)"}/>
      <span style={{fontSize:11,fontFamily:"Roboto,system-ui",fontWeight:on?500:400}}>{t.label}</span>
    </button>;})}
  </div>;
}

function ThemeToggleA({dark,onToggle}){
  return (
    <button onClick={onToggle} style={{background:"var(--surface-card)",border:"1px solid var(--border-default)",borderRadius:999,padding:"7px 14px",color:"var(--text-body)",cursor:"pointer",fontSize:13,fontFamily:"Roboto,system-ui",display:"flex",alignItems:"center",gap:7,transition:"all .2s"}}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        {dark?<><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></>:<><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></>}
      </svg>
      {dark ? "Light mode" : "Dark mode"}
    </button>
  );
}

function DosePairAndroid(){
  const {AndroidHome,AndroidAnalyzer,AndroidResearch,AndroidHistory,AndroidSettings}=window.MSAndroid3;
  const [dark,setDark]=React.useState(()=>sessionStorage.getItem("and-dark")!=="false");
  const [page,setPage]=React.useState(()=>sessionStorage.getItem("and-page")||"home");
  const [prefill,setPrefill]=React.useState([]);

  React.useEffect(()=>{
    document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
    sessionStorage.setItem("and-dark", dark);
  },[dark]);

  const nav=id=>{setPage(id);sessionStorage.setItem("and-page",id);if(id!=="analyze")setPrefill([]);};
  const analyze=drugs=>{setPrefill(drugs);setPage("analyze");};

  return <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
    <ThemeToggleA dark={dark} onToggle={()=>setDark(d=>!d)}/>
    <AndroidDevice dark={dark}>
      <div style={{minHeight:"100%",display:"flex",flexDirection:"column",background:"var(--surface-page)"}}>
        <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none"}}>
          {page==="home"&&<AndroidHome onAnalyze={analyze}/>}
          {page==="analyze"&&<AndroidAnalyzer key={prefill.join("+")} initialDrugs={prefill}/>}
          {page==="research"&&<AndroidResearch/>}
          {page==="history"&&<AndroidHistory onReanalyze={analyze}/>}
          {page==="settings"&&<AndroidSettings/>}
        </div>
        <AndroidBottomNav active={page} onChange={nav}/>
      </div>
    </AndroidDevice>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<DosePairAndroid/>);
</script>
