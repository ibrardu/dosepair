<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>

<!-- ═══ BLOCK 1: Icons · data · buildResult ═══ -->
<script type="text/babel">
const FF="-apple-system,system-ui,sans-serif";
const IP={
  search:[["circle",{cx:11,cy:11,r:8}],["path",{d:"m21 21-4.3-4.3"}]],
  pill:[["path",{d:"m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"}],["path",{d:"m8.5 8.5 7 7"}]],
  flask:[["path",{d:"M14 2v6l3 5.5c1.25 2.13.27 4.81-2.22 5.5a5 5 0 0 1-5.56-1.87C7.7 15.1 8 12.73 9.33 11.2L12 8V2"}],["path",{d:"M8.5 2h7"}],["path",{d:"M7 16h10"}]],
  history:[["path",{d:"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"}],["path",{d:"M3 3v5h5"}],["path",{d:"M12 7v5l4 2"}]],
  settings:[["path",{d:"M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"}],["circle",{cx:12,cy:12,r:3}]],
  plus:[["path",{d:"M5 12h14"}],["path",{d:"M12 5v14"}]],
  warn:[["path",{d:"m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"}],["path",{d:"M12 9v4"}],["path",{d:"M12 17h.01"}]],
  check:[["circle",{cx:12,cy:12,r:10}],["path",{d:"m9 12 2 2 4-4"}]],
  bulb:[["path",{d:"M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"}],["path",{d:"M9 18h6"}],["path",{d:"M10 22h4"}]],
  chevdown:[["path",{d:"m6 9 6 6 6-6"}]],
  utensil:[["path",{d:"M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"}],["path",{d:"M7 2v20"}],["path",{d:"M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"}]],
  flash:[["path",{d:"M13 2 3 14h9l-1 8 10-12h-9l1-8z"}]],
};
function Icon({name,size=22,color="currentColor",sw=2}){
  const p=IP[name];if(!p)return null;
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}>
    {p.map(([t,a],i)=>t==="circle"?<circle key={i} {...a}/>:<path key={i} {...a}/>)}
  </svg>;
}

const PLOTS=["#4F8EF7","#C084FC","#2DD4BF","#F472B6","#E09A3A"];
const PKD={
  Warfarin:{rxcui:"11289",hl:40,pk:4,meta:"CYP2C9",hit:true,src:"dailymed"},
  Aspirin:{rxcui:"1191",hl:6,pk:1,meta:"Hepatic esterases",hit:true,src:"dailymed"},
  Dovato:{rxcui:"2375961",hl:14,pk:1.5,meta:"UGT1A1 85%, CYP3A4 12%",hit:true,src:"dailymed"},
  Tadalafil:{rxcui:"358263",hl:17.5,pk:2,meta:"CYP3A4 primary",hit:true,src:"dailymed"},
  Luteolin:{rxcui:"—",hl:5,pk:1,meta:"CYP3A4 inhibitor",hit:false,src:"llm"},
  Metformin:{rxcui:"6809",hl:6.2,pk:2.5,meta:"Renal, unchanged",hit:true,src:"dailymed"},
  Lisinopril:{rxcui:"29046",hl:12,pk:6,meta:"Renal, unchanged",hit:true,src:"dailymed"},
  Sertraline:{rxcui:"36437",hl:26,pk:5,meta:"CYP2D6, CYP2C19",hit:true,src:"dailymed"},
  Tramadol:{rxcui:"10689",hl:6.3,pk:2,meta:"CYP2D6, CYP3A4",hit:true,src:"dailymed"},
  Atorvastatin:{rxcui:"83367",hl:14,pk:1.5,meta:"CYP3A4",hit:true,src:"dailymed"},
  Amlodipine:{rxcui:"17767",hl:40,pk:7,meta:"CYP3A4",hit:true,src:"dailymed"},
  Omeprazole:{rxcui:"7646",hl:1,pk:1,meta:"CYP2C19",hit:true,src:"dailymed"},
  Clopidogrel:{rxcui:"32968",hl:6,pk:1,meta:"CYP2C19 (prodrug)",hit:true,src:"dailymed"},
  Levothyroxine:{rxcui:"10582",hl:168,pk:2,meta:"Deiodination",hit:true,src:"dailymed"},
  Calcium:{rxcui:"1897",hl:4,pk:2,meta:"None (mineral)",hit:true,src:"openfda"},
};
const IXD=[
  {pair:["Warfarin","Aspirin"],sev:"high",hit:true,effect:"Significantly increased bleeding risk.",mech:"Aspirin inhibits platelet aggregation; warfarin blocks vitamin-K clotting factors."},
  {pair:["Sertraline","Tramadol"],sev:"high",hit:true,effect:"Risk of serotonin syndrome.",mech:"Both raise synaptic serotonin; tramadol adds SNRI activity via CYP2D6 competition."},
  {pair:["Omeprazole","Clopidogrel"],sev:"moderate",hit:true,effect:"Reduced clopidogrel antiplatelet efficacy.",mech:"Omeprazole inhibits CYP2C19, which activates the clopidogrel prodrug."},
  {pair:["Levothyroxine","Calcium"],sev:"moderate",hit:true,effect:"Reduced levothyroxine absorption.",mech:"Calcium chelates levothyroxine in the GI tract. Separate by ≥4h."},
  {pair:["Tadalafil","Luteolin"],sev:"moderate",hit:false,effect:"Possible increased tadalafil exposure.",mech:"Luteolin moderately inhibits CYP3A4, tadalafil's primary clearance pathway."},
  {pair:["Atorvastatin","Amlodipine"],sev:"moderate",hit:true,effect:"Modestly increased statin exposure.",mech:"Amlodipine weakly inhibits CYP3A4 atorvastatin clearance."},
  {pair:["Metformin","Lisinopril"],sev:"low",hit:true,effect:"Generally safe; minor additive glucose lowering.",mech:"ACE inhibitors mildly enhance insulin sensitivity."},
];
const FOOD={
  Warfarin:{note:"Avoid sudden changes in vitamin K intake (leafy greens) — alters INR.",score:6},
  Atorvastatin:{note:"Grapefruit juice significantly increases atorvastatin exposure. Avoid.",score:7},
  Tadalafil:{note:"Grapefruit juice inhibits CYP3A4 — may increase tadalafil levels.",score:5},
  Levothyroxine:{note:"Take 30–60 min before food. Dairy and calcium reduce absorption.",score:5},
  Metformin:{note:"Take with meals to reduce GI upset (nausea, diarrhoea).",score:3},
  Sertraline:{note:"Avoid alcohol — additive CNS depression and worsened mood.",score:4},
};
const SE=[
  {note:"Monitor for serotonin syndrome: agitation, rapid pulse, high temperature, muscle twitching.",score:9,drugs:["Sertraline","Tramadol"]},
  {note:"Myopathy risk (muscle pain/weakness) modestly elevated.",score:5,drugs:["Atorvastatin","Amlodipine"]},
  {note:"Reduced platelet inhibition — consider alternative PPI if high cardiac risk.",score:6,drugs:["Omeprazole","Clopidogrel"]},
  {note:"Monitor for GI bleeding: black or tarry stools, abdominal pain.",score:8,drugs:["Warfarin","Aspirin"]},
];

function buildResult(meds){
  const hs=[8,10,13,16,19];
  const drugs=meds.map((m,i)=>{const pk=PKD[m.name]||{rxcui:"—",hl:8,pk:2,meta:"Unknown",hit:false,src:"llm"};const h=m.hour||hs[i%hs.length];return{...pk,name:m.name,doseH:h,color:PLOTS[i%PLOTS.length],time:m.time||(h<=12?h+"am":(h-12)+"pm"),dose:m.dose||""};});
  const names=drugs.map(d=>d.name);
  const ord={high:0,moderate:1,low:2};
  const ixs=IXD.filter(x=>x.pair.every(p=>names.includes(p))).sort((a,b)=>ord[a.sev]-ord[b.sev]);
  const insights=[];
  ixs.forEach(x=>{
    if(x.sev==="high") insights.push({type:"warning",score:8,text:`Avoid combining ${x.pair[0]} and ${x.pair[1]} without clinical guidance.`,why:x.mech,drugs:x.pair});
    else if(x.sev==="moderate") insights.push({type:"tip",score:5,text:`Separate ${x.pair[0]} and ${x.pair[1]} doses to reduce peak overlap.`,why:x.mech,drugs:x.pair});
  });
  SE.forEach(se=>{if(se.drugs.every(d=>names.includes(d))) insights.push({type:"side_effect",score:se.score,text:se.note,why:"Pharmacodynamic interaction — both agents contribute to the same adverse pathway.",drugs:se.drugs});});
  const seenF=new Set();
  drugs.forEach(d=>{const f=FOOD[d.name];if(f&&!seenF.has(d.name)){seenF.add(d.name);insights.push({type:"food",score:f.score,text:f.note,why:"Food-drug interaction via absorption, CYP3A4 metabolism, or pharmacodynamic overlap.",drugs:[d.name]});}});
  // cache info removed
  return{drugs,ixs,insights,llm:drugs.every(d=>d.src!=="llm")?"groq":"claude haiku",hits:`${drugs.filter(d=>d.hit).length}/${drugs.length}`,worst:ixs[0]?.sev||null};
}

function PlasmaChart({drugs}){
  const ref = React.useRef(null);
  const wrapRef = React.useRef(null);
  const [hover, setHover] = React.useState(null);
  const H = 180;
  React.useEffect(()=>{
    if (!ref.current) return;
    window.DosePairChart.drawChart(ref.current, drugs, {hoverT: hover?hover.t:null, compact: true, height: H});
  },[drugs, hover]);
  const onMove = e => {
    const r = ref.current.getBoundingClientRect();
    const x = e.clientX - r.left;
    const t = window.DosePairChart.xToTime(ref.current, x, {compact: true});
    const data = window.DosePairChart.getHoverData(drugs, t);
    setHover({t, x: e.clientX - r.left, data});
  };
  return <div ref={wrapRef} style={{position:"relative"}}>
    <canvas
      ref={ref}
      style={{width:"100%",height:H,display:"block",cursor:"crosshair",touchAction:"none"}}
      onMouseMove={onMove}
      onMouseLeave={()=>setHover(null)}
      onTouchStart={e=>{e.preventDefault();const t=e.touches[0];const r=ref.current.getBoundingClientRect();const x=t.clientX-r.left;const time=window.DosePairChart.xToTime(ref.current,x,{compact:true});setHover({t:time,x,data:window.DosePairChart.getHoverData(drugs,time)});}}
      onTouchMove={e=>{e.preventDefault();const t=e.touches[0];const r=ref.current.getBoundingClientRect();const x=t.clientX-r.left;const time=window.DosePairChart.xToTime(ref.current,x,{compact:true});setHover({t:time,x,data:window.DosePairChart.getHoverData(drugs,time)});}}
      onTouchEnd={()=>setHover(null)}
    />
    {hover && <div style={{
      position:"absolute",
      left: Math.min(hover.x + 10, (wrapRef.current?.clientWidth || 9999) - 150),
      top: 8,
      background:"var(--surface-card)",
      border:"1px solid var(--border-default)",
      borderRadius: 10,
      padding:"7px 9px",
      boxShadow: "var(--shadow-lift)",
      fontFamily:"var(--font-mono)",
      fontSize: 10,
      color:"var(--text-body)",
      pointerEvents:"none",
      minWidth: 130,
      zIndex: 5,
    }}>
      <div style={{color:"var(--text-muted)",marginBottom:4,fontSize:10}}>{window.DosePairChart.formatTime(hover.t)}</div>
      {hover.data.map(d=>(
        <div key={d.name} style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:d.color,display:"inline-block"}}/>
          <span style={{flex:1,fontFamily:"var(--font-body)",fontSize:11}}>{d.name}</span>
          <span style={{color:"var(--text-secondary)"}}>{d.value.toFixed(0)}%</span>
        </div>
      ))}
    </div>}
    <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:6,fontFamily:"var(--font-mono)",fontSize:10,color:"var(--text-muted)"}}>
      {drugs.map(d=>(
        <span key={d.name} style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:12,height:2,background:d.color,display:"inline-block",borderRadius:1}}/>{d.name}
        </span>
      ))}
    </div>
  </div>;
}


window.MSIOS={Icon,buildResult,PlasmaChart};
</script>

<!-- ═══ BLOCK 2: Home Screen ═══ -->
<script type="text/babel">
const COMBOS=[["Warfarin","Aspirin"],["Metformin","Lisinopril"],["Atorvastatin","Amlodipine"],["Sertraline","Tramadol"],["Omeprazole","Clopidogrel"],["Levothyroxine","Calcium"]];
const SUGG=["Aspirin","Atorvastatin","Amlodipine","Calcium","Clopidogrel","Dovato","Ibuprofen","Levothyroxine","Lisinopril","Luteolin","Metformin","Omeprazole","Sertraline","Sildenafil","Tadalafil","Tramadol","Warfarin"];

function IOSHome({onAnalyze}){
  const {Icon}=window.MSIOS;
  const [query,setQuery]=React.useState("");
  const [chips,setChips]=React.useState([]);
  const [show,setShow]=React.useState(false);
  const matched=query.trim()?SUGG.filter(s=>s.toLowerCase().startsWith(query.toLowerCase())&&!chips.includes(s)).slice(0,5):[];
  const add=name=>{if(chips.length>=5)return;const n=name.trim();if(!n||chips.includes(n))return;setChips([...chips,n]);setQuery("");};
  const onKey=e=>{if(e.key==="+"||e.key===","){e.preventDefault();add(query);}else if(e.key==="Enter"){e.preventDefault();if(query.trim())add(query);else if(chips.length)onAnalyze(chips);}else if(e.key==="Backspace"&&!query&&chips.length)setChips(chips.slice(0,-1));};
  return <div style={{fontFamily:FF,color:"var(--text-body)",paddingBottom:8}}>
    <div style={{textAlign:"center",padding:"24px 16px 20px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:8}}>
        <img src="../../assets/logo.svg" alt="" width="32" height="32"/>
        <span style={{fontSize:26,fontWeight:700,letterSpacing:"-0.02em"}}>DosePair</span>
      </div>
      <p style={{fontSize:13,color:"var(--text-secondary)",margin:0}}>See how your medications interact — before they do.</p>
    </div>
    <div style={{margin:"0 16px 12px"}}>
      <div style={{background:"var(--surface-card)",border:`1px solid ${show?"var(--accent)":"var(--border-default)"}`,borderRadius:16,padding:"10px 14px",boxShadow:show?"0 0 0 3px rgba(79,142,247,.18)":undefined}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:chips.length?8:0}}>
          <Icon name="search" size={16} color="var(--text-muted)"/>
          <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={onKey} onFocus={()=>setShow(true)} onBlur={()=>setTimeout(()=>setShow(false),120)} placeholder={chips.length?"Add drug…":`Search drugs… e.g. "Warfarin + Aspirin"`} style={{flex:1,background:"none",border:"none",outline:"none",color:"var(--text-body)",fontSize:15,fontFamily:FF}}/>
        </div>
        {chips.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {chips.map(c=><span key={c} style={{display:"inline-flex",alignItems:"center",gap:4,background:"var(--tint-blue)",color:"var(--accent)",border:"1px solid rgba(79,142,247,.3)",borderRadius:999,padding:"3px 6px 3px 10px",fontSize:13}}>
            {c}<span onClick={()=>setChips(chips.filter(x=>x!==c))} style={{cursor:"pointer",fontSize:15,lineHeight:1,opacity:.7}}>×</span>
          </span>)}
        </div>}
        {chips.length>0&&<div style={{fontSize:11,color:"var(--text-muted)",marginTop:6,fontFamily:"var(--font-mono)"}}>{chips.length}/5 medications</div>}
      </div>
      {show&&matched.length>0&&<div style={{background:"var(--surface-raised)",border:"1px solid var(--border-default)",borderRadius:12,marginTop:4,overflow:"hidden"}}>
        {matched.map(s=><div key={s} onMouseDown={e=>{e.preventDefault();add(s);}} style={{padding:"11px 14px",fontSize:15,color:"var(--text-body)",cursor:"pointer",borderBottom:"0.5px solid var(--border-default)"}}>{s}</div>)}
      </div>}
    </div>
    <div style={{padding:"0 16px 20px"}}>
      <button disabled={chips.length===0} onClick={()=>onAnalyze(chips)} style={{width:"100%",height:50,borderRadius:14,border:"none",cursor:chips.length?"pointer":"default",background:chips.length?"var(--accent)":"var(--border-default)",color:chips.length?"#fff":"var(--text-muted)",fontSize:17,fontWeight:600,fontFamily:FF,transition:"all .15s"}}>
        Analyze Interactions
      </button>
    </div>
    <div style={{padding:"0 16px"}}>
      <div style={{fontSize:12,color:"var(--text-muted)",fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Quick combos</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {COMBOS.map(c=><button key={c.join("+")} onClick={()=>onAnalyze(c)} style={{background:"var(--surface-card)",border:"1px solid var(--border-default)",borderRadius:999,padding:"6px 14px",fontSize:13,color:"var(--text-body)",cursor:"pointer",fontFamily:FF}}>{c.join(" + ")}</button>)}
      </div>
    </div>
    <div style={{margin:"24px 16px 0",padding:"14px 16px",background:"var(--surface-card)",borderRadius:14,border:"1px solid var(--border-default)",display:"flex",justifyContent:"space-around"}}>
      {[["12,400+","drugs indexed"],["850K+","interactions"],["Free","no account"]].map(([v,l])=><div key={l} style={{textAlign:"center"}}>
        <div style={{fontSize:15,fontWeight:600,color:"var(--accent)",fontFamily:"var(--font-mono)"}}>{v}</div>
        <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{l}</div>
      </div>)}
    </div>
  </div>;
}
window.MSIOS={...window.MSIOS,IOSHome};
</script>

<!-- ═══ BLOCK 3: Analyzer + Results ═══ -->
<script type="text/babel">
const iosSev={high:"var(--severity-high)",moderate:"var(--severity-moderate)",low:"var(--severity-low)"};
const iosSevBg={high:"var(--tint-red)",moderate:"var(--tint-amber)",low:"var(--tint-green)"};
const iosField={background:"var(--surface-page)",border:"1px solid var(--border-default)",borderRadius:10,padding:"9px 12px",color:"var(--text-body)",fontSize:14,outline:"none",fontFamily:FF,width:"100%"};

function InsightCard({ins}){
  const {Icon}=window.MSIOS;
  const [open,setOpen]=React.useState(false);
  const typeMap={
    warning:    {lab:"Warning",     col:"var(--severity-moderate)", bg:"var(--tint-amber)",  icon:"warn"},
    tip:        {lab:"Timing tip",  col:"var(--accent)",            bg:"var(--tint-blue)",   icon:"bulb"},
    info:       {lab:"Info",        col:"var(--severity-low)",      bg:"var(--tint-green)",  icon:"check"},
    food:       {lab:"Food note",   col:"var(--research)",          bg:"var(--tint-teal)",   icon:"utensil"},
    side_effect:{lab:"Side effect", col:"#C084FC",                  bg:"rgba(192,132,252,.12)",icon:"flash"},
  };
  const meta=typeMap[ins.type]||typeMap.info;
  return (
    <div style={{background:"var(--surface-card)",borderRadius:14,border:"1px solid var(--border-default)",overflow:"hidden"}}>
      <button type="button" onClick={()=>setOpen(o=>!o)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:12,display:"flex",gap:10,alignItems:"flex-start",textAlign:"left"}}>
        <div style={{width:28,height:28,borderRadius:8,background:meta.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
          <Icon name={meta.icon} size={14} color={meta.col}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:meta.col,fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600}}>{meta.lab}</span>
            {ins.score&&<span style={{background:ins.score>=7?"var(--tint-red)":ins.score>=4?"var(--tint-amber)":"var(--tint-green)",color:ins.score>=7?"var(--severity-high)":ins.score>=4?"var(--severity-moderate)":"var(--severity-low)",borderRadius:999,padding:"2px 7px",fontSize:10,fontFamily:"var(--font-mono)",fontWeight:700,flexShrink:0}}>{ins.score}<span style={{opacity:.6}}>/10</span></span>}

function IOSAnalyzer({initialDrugs=[]}){
  const {Icon,buildResult,PlasmaChart}=window.MSIOS;
  const mk=(n="",i=0)=>({name:n,dose:"",time:"",key:`${n}-${i}-${Math.random().toString(36).slice(2,6)}`});
  const [rows,setRows]=React.useState(()=>initialDrugs.length?initialDrugs.map(mk):[mk("Dovato",0),mk("Tadalafil",1)]);
  const [result,setResult]=React.useState(null);
  const [loading,setLoading]=React.useState(false);
  const set=(i,p)=>setRows(rows.map((r,j)=>j===i?{...r,...p}:r));
  const run=()=>{const m=rows.filter(r=>r.name.trim());if(!m.length)return;setLoading(true);setResult(null);setTimeout(()=>{setResult(buildResult(m));setLoading(false);},700);};
  React.useEffect(()=>{if(initialDrugs.length)run();},[]);
  return <div style={{fontFamily:FF,color:"var(--text-body)"}}>
    <div style={{padding:"16px 16px 12px"}}>
      <div style={{fontSize:26,fontWeight:700,letterSpacing:"-0.01em"}}>Analyzer</div>
      <div style={{fontSize:13,color:"var(--text-secondary)",marginTop:3}}>Up to 5 medications · tap + to add</div>
    </div>
    <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:8}}>
      {rows.map((row,i)=><div key={row.key} style={{background:"var(--surface-card)",borderRadius:14,padding:12,border:"1px solid var(--border-default)"}}>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input value={row.name} onChange={e=>set(i,{name:e.target.value})} placeholder="Drug name" style={{...iosField,flex:1}}/>
          <button onClick={()=>setRows(rows.filter((_,j)=>j!==i))} style={{width:32,height:38,background:"var(--tint-red)",border:"1px solid rgba(224,92,75,.3)",borderRadius:10,cursor:"pointer",color:"var(--severity-high)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>×</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <input value={row.dose} onChange={e=>set(i,{dose:e.target.value})} placeholder="Dose (5mg)" style={iosField}/>
          <input value={row.time} onChange={e=>set(i,{time:e.target.value})} placeholder="Time (8am)" style={iosField}/>
        </div>
      </div>)}
    </div>
    <div style={{padding:"12px 16px",display:"grid",gridTemplateColumns:"auto 1fr",gap:10}}>
      <button disabled={rows.length>=5} onClick={()=>setRows([...rows,mk("",rows.length)])} style={{height:46,padding:"0 16px",borderRadius:12,border:"1px solid var(--border-default)",background:"var(--surface-card)",color:rows.length>=5?"var(--text-muted)":"var(--text-body)",cursor:rows.length>=5?"default":"pointer",fontSize:14,fontFamily:FF,display:"flex",alignItems:"center",gap:6}}>
        <Icon name="plus" size={16} color={rows.length>=5?"var(--text-muted)":"var(--text-body)"}/> Add
        {rows.length>=5&&<span style={{fontSize:11,color:"var(--severity-moderate)",fontFamily:"var(--font-mono)",marginLeft:2}}>max 5</span>}
      </button>
      <button onClick={run} disabled={loading} style={{height:46,borderRadius:12,border:"none",cursor:loading?"default":"pointer",background:loading?"var(--border-default)":"var(--accent)",color:loading?"var(--text-muted)":"#fff",fontSize:15,fontWeight:600,fontFamily:FF}}>
        {loading?"Analyzing…":"Analyze"}
      </button>
    </div>
    {result&&!loading&&<div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
      {/* Summary */}
      <div style={{background:"var(--surface-card)",borderRadius:14,padding:14,border:"1px solid var(--border-default)"}}>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
          {result.worst&&<span style={{background:iosSevBg[result.worst],color:iosSev[result.worst],borderRadius:6,padding:"2px 8px",fontSize:11,fontFamily:"var(--font-mono)",textTransform:"uppercase"}}>{result.worst}</span>}
        </div>
        <p style={{margin:0,fontSize:14,color:"var(--text-body)",lineHeight:1.5}}>
          {result.ixs.length?`Found ${result.ixs.length} interaction${result.ixs.length>1?"s":""} across ${result.drugs.length} medications.`:`No known interactions across ${result.drugs.length} medication${result.drugs.length>1?"s":""}.`}
        </p>
      </div>
      {/* Chart */}
      <div style={{background:"var(--surface-card)",borderRadius:14,padding:14,border:"1px solid var(--border-default)"}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:10}}>24-hour plasma levels</div>
        <PlasmaChart drugs={result.drugs}/>
      </div>
      {/* Interactions */}
      {result.ixs.length>0&&<>
        <div style={{fontSize:12,color:"var(--text-muted)",fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"0.08em",paddingLeft:2}}>Interactions · {result.ixs.length}</div>
        {result.ixs.map((ix,i)=><div key={i} style={{background:"var(--surface-card)",borderRadius:14,padding:14,border:"1px solid var(--border-default)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontWeight:600,fontSize:14}}>{ix.pair[0]} × {ix.pair[1]}</span>
            <span style={{background:iosSevBg[ix.sev],color:iosSev[ix.sev],borderRadius:6,padding:"2px 8px",fontSize:10,fontFamily:"var(--font-mono)",textTransform:"uppercase",marginLeft:"auto"}}>{ix.sev}</span>
          </div>
          <p style={{margin:"0 0 4px",fontSize:13,color:"var(--text-body)"}}>{ix.effect}</p>
          <p style={{margin:0,fontSize:12,color:"var(--text-secondary)"}}>{ix.mech}</p>
        </div>)}
      </>}
      {/* Insights — new design */}
      <div style={{fontSize:12,color:"var(--text-muted)",fontFamily:"var(--font-mono)",textTransform:"uppercase",letterSpacing:"0.08em",paddingLeft:2}}>Insights · {result.insights.length}</div>
      {result.insights.map((ins,i)=><InsightCard key={i} ins={ins}/>)}
      {/* Disclaimer */}
      <div style={{background:"var(--tint-amber)",border:"1px solid rgba(224,154,58,.35)",borderRadius:14,padding:12,display:"flex",gap:10,alignItems:"flex-start"}}>
        <Icon name="warn" size={16} color="var(--severity-moderate)"/>
        <p style={{margin:0,fontSize:12,color:"var(--text-secondary)",lineHeight:1.5}}><strong style={{color:"var(--severity-moderate)"}}>Not medical advice.</strong> Confirm all changes with your doctor or pharmacist.</p>
      </div>
    </div>}
  </div>;
}
window.MSIOS={...window.MSIOS,IOSAnalyzer};
</script>

          {page==="settings"&&<IOSSettings/>}
        </div>
        <IOSTabBar active={page} onChange={nav}/>
        <div style={{height:34,background:"var(--surface-page)"}}/>
      </div>
    </IOSDevice>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<DosePairIOS/>);
</script>
</body>
</html>
